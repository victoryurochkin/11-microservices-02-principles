worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format gateway '$remote_addr - $request_id [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       'upstream=$upstream_addr upstream_status=$upstream_status '
                       'request_time=$request_time';

    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    upstream security_backend {
        server security:8000;
        keepalive 16;
    }

    upstream uploader_backend {
        server uploader:8000;
        keepalive 16;
    }

    upstream minio_backend {
        server minio:9000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}\n';
        }

        # Внутренний endpoint авторизации. Клиент не может вызвать его напрямую.
        location = /_auth {
            internal;
            proxy_pass http://security_backend/v1/token/validation;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        # POST /v1/register -> security POST /v1/user
        location = /v1/register {
            limit_except POST { deny all; }
            proxy_pass http://security_backend/v1/user;
        }

        # Совместимость с коротким маршрутом.
        location = /register {
            limit_except POST { deny all; }
            proxy_pass http://security_backend/v1/user;
        }

        # POST /v1/token -> security POST /v1/token
        location = /v1/token {
            limit_except POST { deny all; }
            proxy_pass http://security_backend/v1/token;
        }

        # Маршрут из примера проверки задания.
        location = /token {
            limit_except POST { deny all; }
            proxy_pass http://security_backend/v1/token;
        }

        # GET /v1/user с обязательной проверкой Bearer-токена.
        location = /v1/user {
            limit_except GET { deny all; }
            auth_request /_auth;
            proxy_pass http://security_backend/v1/user;
        }

        # POST /v1/upload с обязательной проверкой Bearer-токена.
        location = /v1/upload {
            limit_except POST { deny all; }
            auth_request /_auth;
            proxy_request_buffering off;
            proxy_pass http://uploader_backend/v1/upload;
        }

        # Маршрут из примера проверки задания.
        location = /upload {
            limit_except POST { deny all; }
            auth_request /_auth;
            proxy_request_buffering off;
            proxy_pass http://uploader_backend/v1/upload;
        }

        # Защищённый маршрут из текстового условия:
        # GET /v1/user/{image} -> MinIO GET /images/{image}
        location ~ ^/v1/user/(.+)$ {
            limit_except GET { deny all; }
            auth_request /_auth;
            rewrite ^/v1/user/(.+)$ /images/$1 break;
            proxy_pass http://minio_backend;
        }

        # Публичный совместимый маршрут из приведённого в условии curl-примера.
        # В production его следует также закрыть auth_request либо выдавать presigned URL.
        location ~ ^/images/(.+)$ {
            limit_except GET { deny all; }
            proxy_pass http://minio_backend;
        }

        location / {
            default_type application/json;
            return 404 '{"detail":"route not found"}\n';
        }
    }
}
