services:
  gateway:
    image: nginx:1.29-alpine
    container_name: microservices-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      security:
        condition: service_healthy
      uploader:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - backend

  security:
    build:
      context: ./security
    container_name: microservices-security
    environment:
      JWT_SECRET: ${JWT_SECRET:-secret}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

  uploader:
    build:
      context: ./uploader
    container_name: microservices-uploader
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: images
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
    expose:
      - "8000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

  minio:
    image: quay.io/minio/minio:latest
    container_name: microservices-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    restart: unless-stopped
    networks:
      - backend

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: microservices-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint: >-
      /bin/sh -c '
      until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
        echo "Waiting for MinIO...";
        sleep 2;
      done;
      mc mb --ignore-existing local/images;
      mc anonymous set download local/images;
      '
    restart: "no"
    networks:
      - backend

volumes:
  minio-data:

networks:
  backend:
    driver: bridge
